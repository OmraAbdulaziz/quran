name: quran_tracker
description: تطبيق شخصي لمتابعة حفظ القرآن الكريم بواجهة عربية مينيمالية.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.2+3
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Notifications
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8
  permission_handler: ^11.3.1

  # Dates
  intl: ^0.20.2
  hijri: ^3.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  go_router: ^14.2.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/quran_meta.json

  generate: true
